; PlatformIO Project Configuration — ESP32-S3 N16R8 buttonbox
; 16MB QIO flash + 8MB OPI (octal) PSRAM, native USB HID gamepad.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- N16R8 memory layout ---
board_build.arduino.memory_type = qio_opi   ; QIO flash + OPI (octal) PSRAM
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0          ; native TinyUSB -> enumerate as a USB game controller
    -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial debug over the native USB port

lib_deps =
    olikraus/U8g2 @ ^2.35.19
